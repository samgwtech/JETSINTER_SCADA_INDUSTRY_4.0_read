services:
  influxdb:
    image: influxdb:2.7
    container_name: jetsinter_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: jetsinter_admin_pass
      DOCKER_INFLUXDB_INIT_ORG: jetsinter
      DOCKER_INFLUXDB_INIT_BUCKET: measurements
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: jetsinter-influx-token-change-in-production
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

volumes:
  influxdb_data:
  influxdb_config:
